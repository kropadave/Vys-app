<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rodičovský portál · TeamVYS</title>
<style>
  /* ============================================================
     TeamVYS — Rodičovský dashboard (redesign)
     Brand tokens
     ============================================================ */
  :root {
    --purple: #6b3df5;
    --purple-deep: #5a2fe0;
    --purple-soft: #f3eeff;
    --grad: linear-gradient(135deg, #6b3df5 0%, #e84cc4 55%, #ff8a3d 100%);
    --grad-welcome: linear-gradient(135deg, #f3eeff 0%, #fff5f0 100%);
    --paper: #fdf8f3;
    --ink: #1a1623;
    --ink-soft: #6b6577;
    --ink-faint: #9b95a6;
    --card: #ffffff;
    --line: #efe9f3;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    --shadow-hover: 0 8px 24px rgba(107, 61, 245, 0.14);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ============================================================
     Shell layout
     ============================================================ */
  .shell {
    display: grid;
    grid-template-columns: 248px minmax(0, 1fr);
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--card);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 8px;
  }
  .brand-mark {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: var(--grad);
    display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 15px;
    box-shadow: 0 4px 10px rgba(232, 76, 196, 0.25);
  }
  .brand-name { font-weight: 800; font-size: 16px; letter-spacing: -0.2px; }
  .brand-name span { color: var(--purple); }

  .user-chip {
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    border-radius: var(--radius-sm);
    background: var(--purple-soft);
  }
  .user-initials {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--grad);
    color: #fff; font-weight: 800; font-size: 16px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .user-meta { min-width: 0; }
  .user-meta .name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-meta .role { font-size: 12px; color: var(--ink-soft); }

  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint);
    padding: 0 12px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    color: var(--ink-soft);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    border: none; background: none; width: 100%; text-align: left;
    transition: background 0.18s ease, color 0.18s ease;
  }
  .nav-item svg { width: 19px; height: 19px; flex-shrink: 0; }
  .nav-item:hover { background: var(--paper); color: var(--ink); }
  .nav-item.active {
    background: var(--purple);
    color: #fff;
    box-shadow: 0 4px 12px rgba(107, 61, 245, 0.28);
  }
  .nav-item.active svg { stroke: #fff; }

  .sidebar-footer { margin-top: auto; }
  .signout {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    color: var(--ink-soft); font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; background: none; width: 100%;
    transition: background 0.18s ease;
  }
  .signout:hover { background: var(--paper); color: var(--ink); }

  /* ---------- Main ---------- */
  .main {
    padding: 28px 32px 48px;
    max-width: 1180px;
    width: 100%;
  }

  /* Welcome bar */
  .welcome {
    background: var(--grad-welcome);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .welcome::after {
    content: "";
    position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px; border-radius: 50%;
    background: var(--grad);
    opacity: 0.10;
    filter: blur(8px);
  }
  .welcome-eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--purple);
    margin-bottom: 6px;
  }
  .welcome h1 {
    font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
    line-height: 1.15; margin-bottom: 10px;
  }
  .welcome-sub {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px;
    font-size: 14px; color: var(--ink-soft);
  }
  .welcome-sub .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-faint); }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(107, 61, 245, 0.14);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 13px; font-weight: 600; color: var(--ink);
  }
  .status-pill b { color: var(--purple); }

  /* Section heading */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 4px 0 14px;
  }
  .section-head h2 { font-size: 17px; font-weight: 800; letter-spacing: -0.2px; }
  .section-head .hint { font-size: 13px; color: var(--ink-faint); }

  /* Grid */
  .grid-2 {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 20px;
  }

  /* Generic card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
  }

  /* Action card */
  .action-card {
    display: flex; align-items: center; gap: 16px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .action-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  .action-icon {
    width: 50px; height: 50px;
    border-radius: 999px;
    background: var(--grad);
    display: grid; place-items: center;
    color: #fff; flex-shrink: 0;
    box-shadow: 0 6px 14px rgba(232, 76, 196, 0.28);
  }
  .action-icon svg { width: 23px; height: 23px; }
  .action-body { flex: 1; min-width: 0; }
  .action-body .title { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .action-body .desc { font-size: 13px; color: var(--ink-soft); }
  .action-arrow { color: var(--ink-faint); flex-shrink: 0; transition: transform 0.2s ease, color 0.2s ease; }
  .action-card:hover .action-arrow { transform: translateX(3px); color: var(--purple); }

  /* Stat card */
  .stat-card { text-align: left; }
  .stat-card .label { font-size: 13px; color: var(--ink-soft); font-weight: 600; margin-bottom: 8px; }
  .stat-card .value { font-size: 34px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .stat-card .value small { font-size: 16px; color: var(--ink-faint); font-weight: 700; }
  .stat-card .trend { margin-top: 10px; font-size: 12.5px; font-weight: 600; color: var(--purple); display: inline-flex; gap: 5px; align-items: center; }

  /* Empty / onboarding card */
  .onboarding {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    background:
      radial-gradient(120% 120% at 50% 0%, rgba(243, 238, 255, 0.7) 0%, rgba(255, 255, 255, 0) 60%),
      var(--card);
    border: 1px dashed rgba(107, 61, 245, 0.22);
  }
  .onboarding-icon {
    width: 84px; height: 84px;
    border-radius: 24px;
    background: var(--grad);
    display: grid; place-items: center;
    color: #fff;
    box-shadow: 0 10px 28px rgba(232, 76, 196, 0.3);
    margin-bottom: 4px;
  }
  .onboarding-icon svg { width: 40px; height: 40px; }
  .onboarding h3 { font-size: 21px; font-weight: 800; letter-spacing: -0.3px; }
  .onboarding p { font-size: 14.5px; color: var(--ink-soft); max-width: 420px; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 24px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(107, 61, 245, 0.3);
    transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    margin-top: 6px;
  }
  .btn-primary:hover { background: var(--purple-deep); transform: translateY(-1px); box-shadow: 0 10px 22px rgba(107, 61, 245, 0.38); }
  .btn-primary svg { width: 19px; height: 19px; }

  /* Child card (when children exist) */
  .child-card { display: flex; flex-direction: column; gap: 14px; }
  .child-top { display: flex; align-items: center; gap: 14px; }
  .child-avatar {
    width: 52px; height: 52px; border-radius: 15px;
    background: var(--grad); color: #fff;
    display: grid; place-items: center; font-weight: 800; font-size: 18px;
    flex-shrink: 0;
  }
  .child-name { font-weight: 800; font-size: 16px; }
  .child-course { font-size: 13px; color: var(--ink-soft); }
  .level-badge {
    margin-left: auto;
    background: var(--purple-soft); color: var(--purple);
    font-size: 12px; font-weight: 700; border-radius: 999px; padding: 4px 11px;
  }
  .progress { height: 8px; border-radius: 999px; background: var(--paper); overflow: hidden; }
  .progress > i { display: block; height: 100%; border-radius: 999px; background: var(--grad); width: 0; transition: width 1s cubic-bezier(0.22, 1, 0.36, 1); }
  .child-meta { display: flex; gap: 20px; font-size: 13px; }
  .child-meta div span { display: block; color: var(--ink-faint); font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .child-meta div b { font-size: 15px; }

  /* ============================================================
     Animations
     ============================================================ */
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .stagger { opacity: 0; animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  @keyframes shimmer {
    0%   { background-position: -420px 0; }
    100% { background-position: 420px 0; }
  }
  .skeleton { pointer-events: none; }
  .sk-line, .sk-icon, .sk-block {
    background: linear-gradient(90deg, #efeaf2 0px, #f7f3fa 60px, #efeaf2 120px);
    background-size: 600px 100%;
    animation: shimmer 1.3s infinite linear;
    border-radius: 8px;
  }
  .sk-icon { width: 50px; height: 50px; border-radius: 999px; flex-shrink: 0; }
  .sk-line { height: 12px; margin: 7px 0; }
  .sk-line.w-40 { width: 40%; }
  .sk-line.w-60 { width: 60%; }
  .sk-line.w-80 { width: 80%; }
  .sk-block { height: 46px; }

  @media (prefers-reduced-motion: reduce) {
    .stagger { animation: none; opacity: 1; }
    .sk-line, .sk-icon, .sk-block { animation: none; }
    .progress > i { transition: none; }
  }

  /* ============================================================
     Responsive
     ============================================================ */
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar {
      position: static; height: auto;
      flex-direction: row; align-items: center; flex-wrap: wrap;
      gap: 14px; padding: 14px 16px;
    }
    .sidebar .nav { flex-direction: row; flex-wrap: wrap; }
    .nav-label, .user-chip .user-meta, .sidebar-footer { display: none; }
    .nav-item span { display: none; }
    .nav-item { padding: 10px; }
    .main { padding: 20px 16px 36px; }
  }
  @media (max-width: 640px) {
    .grid-2 { grid-template-columns: 1fr; }
    .welcome h1 { font-size: 24px; }
    .welcome { padding: 22px; }
  }
</style>
</head>
<body>
  <div class="shell">
    <!-- ================= SIDEBAR ================= -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">V</div>
        <div class="brand-name">Team<span>VYS</span></div>
      </div>

      <div class="user-chip">
        <div class="user-initials" id="userInitials">JN</div>
        <div class="user-meta">
          <div class="name" id="userName">Jana Nováková</div>
          <div class="role">Rodičovský účet</div>
        </div>
      </div>

      <nav class="nav">
        <div class="nav-label">Přehled</div>
        <button class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
          <span>Domů</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Účastníci</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
          <span>Platby</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
          <span>Dokumenty</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg>
          <span>Profil</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="signout">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          Odhlásit se
        </button>
      </div>
    </aside>

    <!-- ================= MAIN ================= -->
    <main class="main">
      <!-- Welcome bar -->
      <section class="welcome stagger" style="animation-delay:0ms">
        <div class="welcome-eyebrow">Rodičovský portál</div>
        <h1>Vítej zpátky, <span id="firstName">Jano</span> 👋</h1>
        <div class="welcome-sub">
          <span id="todayDate">středa 10. června 2026</span>
          <span class="dot"></span>
          <span class="status-pill">Děti v rodině: <b id="kidCount">0</b></span>
          <span class="status-pill">Docházka rodiny: <b><span id="attDone">0</span>/<span id="attTotal">0</span></b></span>
        </div>
      </section>

      <!-- Action cards -->
      <div class="section-head">
        <h2>Co řešit nejdřív</h2>
        <span class="hint">3 podněty</span>
      </div>
      <div class="grid-2" id="actionGrid">
        <!-- Skeleton placeholders (shown first) -->
        <div class="card skeleton action-card">
          <div class="sk-icon"></div>
          <div style="flex:1">
            <div class="sk-line w-60"></div>
            <div class="sk-line w-80"></div>
          </div>
        </div>
        <div class="card skeleton action-card">
          <div class="sk-icon"></div>
          <div style="flex:1">
            <div class="sk-line w-40"></div>
            <div class="sk-line w-80"></div>
          </div>
        </div>
      </div>

      <!-- Stats + children -->
      <div class="section-head" style="margin-top:28px">
        <h2>Přehled rodiny</h2>
        <span class="hint">aktuální stav</span>
      </div>
      <div class="grid-2" id="overviewGrid">
        <div class="card skeleton">
          <div class="sk-line w-40"></div>
          <div class="sk-block" style="margin-top:14px"></div>
        </div>
        <div class="card skeleton">
          <div class="sk-line w-40"></div>
          <div class="sk-block" style="margin-top:14px"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
  /* ============================================================
     Demo data — replace with real API payload
     ============================================================ */
  const DATA = {
    user: { firstName: "Jano", fullName: "Jana Nováková", initials: "JN" },
    family: { kids: 0, attendanceDone: 0, attendanceTotal: 0, totalPaid: 0 },
    actions: [
      { icon: "userplus", title: "Přidej první dítě", desc: "Propoj účet z aplikace nebo vytvoř profil bez telefonu." },
      { icon: "doc", title: "Vyplnit dokumenty", desc: "Kroužek a tábor mají odlišný balíček dokumentů." },
      { icon: "wallet", title: "Prohlédnout nabídku", desc: "Kroužky, tábory a workshopy ve tvém okolí." },
    ],
    // children: [] => empty/onboarding state. Add objects to show child cards.
    children: [],
  };

  const ICONS = {
    userplus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg>',
    doc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15l2 2 4-4"/></svg>',
    wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.4" fill="currentColor"/></svg>',
    arrow: '<svg class="action-arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>',
    kids: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/><path d="M19 8l1.5 1.5L23 7"/></svg>',
  };

  /* ---------- Animated count-up ---------- */
  function countUp(el, target, suffix = "") {
    if (target === 0) { el.textContent = "0" + suffix; return; }
    const dur = 900, start = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(eased * target) + suffix;
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ---------- Render ---------- */
  function renderWelcome() {
    document.getElementById("userInitials").textContent = DATA.user.initials;
    document.getElementById("userName").textContent = DATA.user.fullName;
    document.getElementById("firstName").textContent = DATA.user.firstName;
    document.getElementById("todayDate").textContent =
      new Date().toLocaleDateString("cs-CZ", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    countUp(document.getElementById("kidCount"), DATA.family.kids);
    countUp(document.getElementById("attDone"), DATA.family.attendanceDone);
    document.getElementById("attTotal").textContent = DATA.family.attendanceTotal;
  }

  function actionCardHTML(a, i) {
    return `
      <div class="card action-card stagger" style="animation-delay:${i * 80}ms">
        <div class="action-icon">${ICONS[a.icon] || ICONS.arrow}</div>
        <div class="action-body">
          <div class="title">${a.title}</div>
          <div class="desc">${a.desc}</div>
        </div>
        ${ICONS.arrow}
      </div>`;
  }

  function childCardHTML(c, i) {
    const pct = Math.min(100, Math.round((c.xp / c.nextXp) * 100));
    return `
      <div class="card child-card stagger" style="animation-delay:${i * 80}ms">
        <div class="child-top">
          <div class="child-avatar">${c.initials}</div>
          <div>
            <div class="child-name">${c.name}</div>
            <div class="child-course">${c.course}</div>
          </div>
          <div class="level-badge">Level ${c.level}</div>
        </div>
        <div class="progress"><i data-w="${pct}"></i></div>
        <div class="child-meta">
          <div><span>Náramek</span><b>${c.bracelet}</b></div>
          <div><span>Docházka</span><b>${c.attDone}/${c.attTotal}</b></div>
          <div><span>XP</span><b>${c.xp}</b></div>
        </div>
      </div>`;
  }

  function onboardingHTML() {
    return `
      <div class="card onboarding stagger" style="animation-delay:80ms">
        <div class="onboarding-icon">${ICONS.kids}</div>
        <h3>Zatím tu není žádné dítě</h3>
        <p>Propoj dítě z aplikace pomocí kódu, nebo vytvoř profil bez telefonu. Pak uvidíš docházku, XP a platby na jednom místě.</p>
        <button class="btn-primary" onclick="addChild()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          Přidat dítě
        </button>
      </div>`;
  }

  function renderActions() {
    document.getElementById("actionGrid").innerHTML =
      DATA.actions.map(actionCardHTML).join("");
  }

  function renderOverview() {
    const grid = document.getElementById("overviewGrid");
    if (DATA.children.length === 0) {
      grid.innerHTML = onboardingHTML();
      return;
    }
    let html = DATA.children.map(childCardHTML).join("");
    grid.innerHTML = html;
    // animate progress bars after paint
    requestAnimationFrame(() => {
      grid.querySelectorAll(".progress > i").forEach((bar) => {
        requestAnimationFrame(() => { bar.style.width = bar.dataset.w + "%"; });
      });
    });
  }

  function addChild() {
    // hook into real "add participant" flow
    alert("Otevře se průvodce přidáním dítěte.");
  }

  /* ---------- Boot: skeleton → data ---------- */
  function boot() {
    renderWelcome();
    // simulate network latency to show skeleton shimmer
    setTimeout(() => {
      renderActions();
      renderOverview();
    }, 900);
  }

  boot();
  </script>
</body>
</html>
